<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Service | PrimeCore</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='user.css') }}">

</head>
<body>

<section id="booking">
    <div class="booking-container">
        <h2>Book a Service</h2>

        <form action="{{ url_for('booking') }}" method="POST" enctype="multipart/form-data">

            <!-- Service Type -->
            <label for="service">Service Type:</label>
            <input type="text" id="service" name="serviceType" value="{{ service }}" readonly>

            <!-- Issue Type Collapsible -->
            <label> Issue Type: </label>
                    {% for issue in issues %}
                    <label class="issue item">
                        <input type="radio" name="issue" value="{{ issue }}" required>
                        {{ issue }}
              
                    </label>
                    {% endfor %}
                </select>

            <!-- Description (always visible) -->
            <label for="description">Description:</label>
            <textarea name="description" rows="4" placeholder="Describe the issue..." required></textarea>

            <!-- Upload photo-->
            <label for="photo">Upload Photo (Optional):</label>
            <input type="file" id="photo" name="photo" accept="image/*">
            <img id="photoPreview" src="#" alt="Photo Preview" style="display:none; margin-top:10px; max-width:200px; border-radius:5px; border:1px solid #ccc;">

            <!-- Urgency (always visible) -->
            <label>Urgency Level:</label>
            <label><input type="radio" name="urgency" value="Standard (24-48 hrs)" required> Standard (24-48 hrs)</label>
            <label><input type="radio" name="urgency" value="Priority (Same Day)"> Priority (Same Day)</label>
            <label><input type="radio" name="urgency" value="Immediate"> Immediate</label>

            <!-- Customer Info (always visible) -->
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" required>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="address">Address / Landmark:</label>
            <input type="text" id="address" name="address" required>

            <label for="date">Preferred Date:</label>
            <input type="date" id="date" name="date" required>

            <button type="submit" class="btn-primary">Submit Request</button>

        </form>
    </div>
</section>

<script>
document.getElementById('photo').addEventListener('change', function(event) {
    const preview = document.getElementById('photoPreview');
    const file = event.target.files[0];

    if(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(file);
    } else {
        preview.src = '#';
        preview.style.display = 'none';
    }
});
</script>
</body>
</html>
